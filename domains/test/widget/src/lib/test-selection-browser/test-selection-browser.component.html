@if (isLoading()) {
<div class="flex flex-col justify-center h-full">
  @for (_ of Array(15); track $index) {
  <p-skeleton class="mb-3" />
  }
</div>
} @else {
<div class="w-max min-w-full">
  <p-tree
    [value]="testSelectionTree()"
    selectionMode="single"
    [(selection)]="selectedTestSelectionNode"
    (onNodeSelect)="onSelectTestSelectionNode($event)"
    (onNodeUnselect)="onUnselectTestSelectionNode()"
  >
    <ng-template pTemplate="default" let-node>
      <div class="max-w-96">
        @if (node.data.type === "SUITE") {
        <mxevolve-icon name="folder" size="md" />
        } @else {
        <mxevolve-icon name="description" size="md" />
        }
        <span class="pl-1">{{ node.label }}</span>
      </div>
    </ng-template>
  </p-tree>
</div>
}
