<div class="flex flex-col gap-6 p-4">
  <h3 class="text-lg font-semibold" data-testid="merge-header">
    Merge into '{{ data().destinationBranch }}' is {{ mergeHeaderVerb() }}
  </h3>

  <div class="flex flex-wrap items-stretch gap-6">
    <div class="flex flex-col gap-1">
      <span class="text-sm text-surface-500">Merge Status</span>
      <div class="flex items-center gap-2">
        <p-tag
          [severity]="mergeStatusSeverity()"
          data-testid="merge-status-tag"
        >
          {{ mergeStatusLabel() }}
        </p-tag>
      </div>
    </div>
    <p-divider layout="vertical" />
    <div class="flex flex-col gap-1">
      <span class="text-sm text-surface-500">Merge Failure Reason</span>
      <span class="text-sm font-semibold" data-testid="merge-failure-reason">
        {{ failureReasonMessage() }}
      </span>
    </div>
  </div>
</div>
