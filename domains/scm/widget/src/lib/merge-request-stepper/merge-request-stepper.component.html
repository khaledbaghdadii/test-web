@if (isLoading()) {
<div class="flex items-center justify-center min-h-[400px]">
  <p-progressSpinner strokeWidth="4" />
</div>
} @else {
<mxevolve-stepper
  [steps]="steps()"
  orientation="vertical"
  class="min-h-[400px]"
  verticalStepperHeightLimitingClasses="h-[35vh]"
>
  <mxevolve-step stepId="under-review">
    <ng-template>
      @if (reviewStageData()) {
      <mxevolve-review-stage-details [data]="reviewStageData()!" />
      }
    </ng-template>
  </mxevolve-step>
  <mxevolve-step stepId="under-validation">
    <ng-template>
      @if (underValidationStageData()) {
      <mxevolve-under-validation-stage-details
        [data]="underValidationStageData()!"
      />
      }
    </ng-template>
  </mxevolve-step>
  <mxevolve-step stepId="merge">
    <ng-template>
      @if (mergeStageData()) {
      <mxevolve-merge-stage-details [data]="mergeStageData()!" />
      }
    </ng-template>
  </mxevolve-step>
</mxevolve-stepper>
}
