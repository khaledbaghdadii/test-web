<div class="flex items-end gap-6" [formGroup]="runTpkForm">
  <div class="flex min-w-80 flex-col gap-2">
    <label for="run-tpk">
      Select a TPK that you wish to launch to validate your change
      <span class="text-red-500">*</span>
    </label>
    <p-select
      inputId="run-tpk"
      formControlName="scenarioDefinitionId"
      [options]="scenarioDefinitions()"
      optionLabel="name"
      optionValue="id"
      placeholder="Select TPK"
      [filter]="true"
      [disabled]="selectionDisabled()"
      styleClass="w-full"
    />
  </div>

  <p-button
    id="submit-create-test-package-definition"
    label="Run TPK"
    [disabled]="runDisabled()"
    [loading]="runLoading()"
    [pTooltip]="isExecutionAllowed() ? '' : rejectionReasonMessage()"
    (onClick)="runScenarioExecution()"
  />
</div>

<p-dialog
  header="Run TPK"
  [visible]="showModal()"
  (visibleChange)="showModal.set($event)"
  [modal]="true"
  [style]="{ width: '40rem' }"
  [appendTo]="'body'"
>
  <ng-template pTemplate="content">
    @if (warningMessage()) {
    <div class="my-4">
      <p-message severity="warn">
        <mxevolve-icon name="warning" class="mr-2" />
        {{ warningMessage() }}
      </p-message>
    </div>
    }

    <div class="flex items-start">
      <p-checkbox
        [ngModel]="keepServices()"
        [ngModelOptions]="{ standalone: true }"
        [binary]="true"
        (ngModelChange)="keepServices.set($event)"
        inputId="keepServicesCheckbox"
      />
      <div class="ml-3 flex flex-col">
        <label for="keepServicesCheckbox">Keep services running</label>
        <p class="mb-2 text-sm italic text-surface-500 dark:text-surface-300">
          Keep environment services running after the test ends
        </p>
      </div>
    </div>
  </ng-template>
  <ng-template pTemplate="footer">
    <div class="flex w-full items-center justify-between">
      <p-button [outlined]="true" label="Cancel" (onClick)="closeModal()" />
      <p-button label="Run TPK" [loading]="runLoading()" (onClick)="runScenario()" />
    </div>
  </ng-template>
</p-dialog>
