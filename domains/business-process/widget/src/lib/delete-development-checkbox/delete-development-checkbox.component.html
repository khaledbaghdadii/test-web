@if (developmentId()) {
<div class="flex flex-col gap-2">
  <div class="flex items-center">
    <mxevolve-icon
      name="warning"
      size="md"
      color="var(--p-red-500)"
      class="mr-2"
    />

    <p-checkbox
      inputId="deleteDevelopment"
      [binary]="true"
      [ngModel]="checked()"
      (ngModelChange)="onCheckedChange($event)"
    />

    <label for="deleteDevelopment" class="ml-2">
      Delete branch @if (branchName.hasValue() && branchName.value()) {
      <b>{{ branchName.value() }}</b>
      } {{ actionLabel() }}
    </label>
  </div>

  <small class="mt-1 block text-xs">
    Note: If the branch is used by another process, it will not be deleted.
  </small>
</div>
}
