<p-button
  [rounded]="true"
  [text]="true"
  severity="danger"
  [disabled]="executionNotAbortable()"
  (onClick)="openAbortDialog($event)"
  pTooltip="Abort"
  tooltipPosition="top"
  [loading]="isLoading()"
  ariaLabel="Abort business process"
>
  <ng-template #icon>
    <mxevolve-icon name="power_settings_new" />
  </ng-template>
</p-button>

<p-confirmDialog
  appendTo="self"
  [key]="confirmDialogKey()"
  class="dialog-cols-4"
>
  <ng-template #message>
    <div class="flex flex-col gap-4">
      <div
        class="flex items-center w-full border-b border-surface-100 dark:border-surface-700 pb-4"
      >
        <mxevolve-icon
          name="power_settings_new"
          size="xl"
          color="var(--p-red-500)"
          class="mx-6"
        />
        <div class="max-w-md">
          <p>Are you sure you want to abort the process?</p>
          <p>
            This action will end the business process, prevent further actions,
            and clean all its resources, including environments and test
            executions.
          </p>
        </div>
      </div>

      <mxevolve-delete-development-checkbox
        [projectId]="projectId()"
        [processId]="processId()"
        [familyId]="familyId()"
        [formControl]="deleteDevelopmentControl"
        actionLabel="when process is aborted"
      />
    </div>
  </ng-template>
</p-confirmDialog>
