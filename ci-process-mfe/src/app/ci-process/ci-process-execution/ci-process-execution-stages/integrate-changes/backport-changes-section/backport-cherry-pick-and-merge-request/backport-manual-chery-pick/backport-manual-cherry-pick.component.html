<mxflow-warning-alert
  [warningMessage]="
    'Cherry-pick could not be completed automatically. Please manually cherry-pick your commits to the branch \'' +
    backport.initializeDevelopmentState.cherryPickBranchName +
    '\' and then click \'Cherry-Pick Done\' to open a merge request'
  "
  [closeable]="false"
>
</mxflow-warning-alert>

<div class="flex flex-col items-center mt-4">
  <p-button
    label="Cherry-Pick Done"
    id="cherry-pick-done-button"
    size="large"
    [disabled]="cherryPickDoneDisabled"
    (onClick)="confirmCommitsCherryPicked($event)"
  ></p-button>
</div>
