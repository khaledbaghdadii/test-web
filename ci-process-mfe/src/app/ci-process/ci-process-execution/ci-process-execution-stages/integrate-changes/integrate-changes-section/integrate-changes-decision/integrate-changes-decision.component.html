<mxflow-step-result>
  <div result class="flex content-center gap-2">
    <ng-container>
      <i class="pi stop pi-ban text-2xl" id="stop-icon"></i>
      <h4 class="m-0">Stopped</h4>
    </ng-container>
  </div>
  <div additional-info>
    <mxflow-input-provider [requester]="requester"></mxflow-input-provider>
  </div>
</mxflow-step-result>
