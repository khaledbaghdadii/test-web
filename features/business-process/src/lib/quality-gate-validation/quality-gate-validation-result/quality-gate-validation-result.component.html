<p-panel>
  <ng-template #header>
    <h3 class="text-lg font-semibold flex mr-2">
      <span>Quality Gate Validation Status:</span>
      <span class="flex ml-2 content-center gap-2">
        <ng-content select="[result]">
          <mxflow-quality-gate-validation-status
            [decision]="validationResult.decision"
          ></mxflow-quality-gate-validation-status>
        </ng-content>
      </span>
    </h3>
  </ng-template>

  <div class="flex flex-col gap-2">
    @if (validationResult.comment) {
    <div>
      <strong>Comment:</strong>
      <mxflow-collapsible-message
        [message]="validationResult.comment"
      ></mxflow-collapsible-message>
    </div>
    } @if (validationResult.requester) {
    <mxflow-input-provider
      [requester]="validationResult.requester"
    ></mxflow-input-provider>
    }
  </div>
</p-panel>
