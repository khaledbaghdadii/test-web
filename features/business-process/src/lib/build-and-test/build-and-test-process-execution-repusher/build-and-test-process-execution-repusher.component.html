<p-dialog
  [(visible)]="isVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!isExecuting"
  [style]="{ width: '40vw', maxHeight: '70vh' }"
  header="Execute Build & Test Process Definition"
  (onHide)="hideRepusherModal()"
>
  @if (errorMessage) {
  <div class="my-1">
    <mxflow-error-alert
      [errorMessage]="errorMessage"
      [closeable]="false"
    ></mxflow-error-alert>
  </div>
  } @if (loading) {
  <p-skeleton height="10rem"></p-skeleton>
  }

  <mxevolve-repush-build-and-test-process-input></mxevolve-repush-build-and-test-process-input>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 mt-2">
      <p-button
        (onClick)="repushBuildAndTestExecution()"
        [disabled]="
          !inputsComponent.isFormInitialized || !inputsComponent.form?.valid
        "
        [loading]="isExecuting"
      >
        Execute
      </p-button>
      <p-button
        (onClick)="hideRepusherModal()"
        [outlined]="true"
        [disabled]="isExecuting"
      >
        Cancel
      </p-button>
    </div>
  </ng-template>
</p-dialog>
