<p-dialog
  [(visible)]="isVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!isExecuting"
  [style]="{ width: '40vw', maxHeight: '70vh' }"
  header="Execute On Demand Backport Process Definition"
  (onHide)="hideExecutorModal()"
>
  @if (errorMessage) {
  <div class="my-1">
    <mxflow-error-alert
      [errorMessage]="errorMessage"
      [closeable]="false"
    ></mxflow-error-alert>
  </div>
  }

  <mxevolve-execute-backport-process-input></mxevolve-execute-backport-process-input>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 mt-2">
      <p-button
        (onClick)="executeBackportDefinition()"
        [disabled]="!inputComponent.form.valid || isExecuting"
        [loading]="isExecuting"
      >
        Execute
      </p-button>
      <p-button
        (onClick)="hideExecutorModal()"
        [outlined]="true"
        [disabled]="isExecuting"
      >
        Cancel
      </p-button>
    </div>
  </ng-template>
</p-dialog>
