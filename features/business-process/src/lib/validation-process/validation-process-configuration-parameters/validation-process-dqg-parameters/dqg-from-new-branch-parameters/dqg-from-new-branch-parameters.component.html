<mxevolve-definition-input
  style="display: contents"
  label="Archival Branch Name"
  description="Enter the name of the archival branch that you wish to use or create"
  [inputFormControl]="archivalBranchNameFormControl"
  inputFormControlName="archivalBranchName"
  [inputAccessMode]="inputAccessMode"
  [displayMode]="displayMode"
  [forceShow]="forceShowArchivalBranch"
  [showValidationErrors]="false"
>
  <mxevolve-branch-input
    [branchShouldExist]="false"
    [projectId]="projectId"
    [repoId]="repositoryIdFormControl.value"
    [branchNameFormControl]="archivalBranchNameFormControl"
    [initialValue]="archivalBranchNameInitialValue"
    (initialInvalid)="showArchivalBranchError()"
  ></mxevolve-branch-input>
</mxevolve-definition-input>
<mxevolve-definition-input
  style="display: contents"
  label="Final Product (represented by Tag-Commit ID)"
  description="Select the final product that you wish to use in your validation"
  [inputFormControl]="finalProductIdFromControl"
  inputFormControlName="finalProductId"
  [inputAccessMode]="inputAccessMode"
  [displayMode]="displayMode"
  [forceShow]="forceShowFinalProductId"
  tooltip="A final product is the client config and the tooling used to validate it. It will be packaged and shipped to the client when it reaches the right quality level."
>
  <mxevolve-business-process-final-product-selector
    [projectId]="projectId"
    businessProcessQualityLevel="MQG"
    [finalProductSelectionFormControl]="finalProductSelectionControl"
    [showAsTags]="true"
    [repositoryId]="repositoryIdFormControl.value"
    finalProductSelectionFormControlName="finalProductId"
  >
  </mxevolve-business-process-final-product-selector>
</mxevolve-definition-input>
@if (rtpCommitIdFromControl.value) {
<mxevolve-definition-input
  style="display: contents"
  label="RTP Commit ID"
  description="Select the RTP commit from which you want to take your branch"
  [inputFormControl]="rtpCommitIdFromControl"
  inputFormControlName="rtpCommitId"
  [inputAccessMode]="inputAccessMode"
  [forceShow]="forceShowRtpCommitId"
  [displayMode]="displayMode"
>
  <input
    pInputText
    class="w-full"
    id="rtpCommitId"
    [formControl]="rtpCommitIdFromControl"
    [readonly]="true"
    [attr.aria-describedby]="'rtpCommitId-help'"
    [style.background-color]="'#f0f0f0'"
    [style.color]="'#888'"
    [style.cursor]="'not-allowed'"
  />
</mxevolve-definition-input>
}
