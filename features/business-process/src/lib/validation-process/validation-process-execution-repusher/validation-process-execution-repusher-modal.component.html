<p-dialog
  [(visible)]="isVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!isExecuting"
  [style]="{ width: '40vw', maxHeight: '70vh' }"
  header="Execute Validation Process Definition"
  (onHide)="hideRepusherModal()"
>
  <div class="my-1">
    @if (errorMessage) {
    <mxflow-error-alert
      [errorMessage]="errorMessage"
      [closeable]="false"
    ></mxflow-error-alert>
    } @if (loading) {
    <div>
      <p-skeleton height="10rem"></p-skeleton>
    </div>
    }
  </div>

  <mxevolve-repush-validation-process-execution-inputs>
  </mxevolve-repush-validation-process-execution-inputs>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 mt-2">
      <p-button
        (onClick)="repushValidationExecution()"
        [disabled]="
          inputsComponent.isFormInitialized && !inputsComponent.form.valid
        "
        [loading]="isExecuting"
      >
        Execute
      </p-button>
      <p-button
        (onClick)="hideRepusherModal()"
        [outlined]="true"
        [disabled]="isExecuting"
      >
        Cancel
      </p-button>
    </div>
  </ng-template>
</p-dialog>
