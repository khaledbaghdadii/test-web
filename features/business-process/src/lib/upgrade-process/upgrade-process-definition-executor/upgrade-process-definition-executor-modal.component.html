<p-dialog
  [(visible)]="isVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [closable]="!isExecuting"
  [closeOnEscape]="!isExecuting"
  [style]="{ width: '40vw', maxHeight: '70vh' }"
  header="Execute Upgrade Process Definition"
  (onHide)="hideExecutorModal()"
>
  @if (errorMessage) {
  <mxflow-error-alert
    [errorMessage]="errorMessage"
    [closeable]="false"
  ></mxflow-error-alert>
  }

  <mxevolve-execute-upgrade-process-definition-inputs>
  </mxevolve-execute-upgrade-process-definition-inputs>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 mt-2">
      <p-button
        (onClick)="executeUpgradeDefinition()"
        [disabled]="
          !inputsComponent.form.valid ||
          isExecuting ||
          inputsComponent.form.pending
        "
        [loading]="isExecuting"
      >
        Execute
      </p-button>
      <p-button
        (onClick)="hideExecutorModal()"
        [outlined]="true"
        [disabled]="isExecuting"
      >
        Cancel
      </p-button>
    </div>
  </ng-template>
</p-dialog>
