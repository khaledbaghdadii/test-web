@if (isFormInitialized) {
<form [formGroup]="form">
  <mxflow-mandatory-field></mxflow-mandatory-field>
  <div class="grid grid-cols-12 gap-x-8 gap-y-4">
    <mxevolve-definition-input
      style="display: contents"
      description=""
      inputFormControlName="officialFormControl"
      [inputFormControl]="officialFormControl"
      [displayMode]="DisplayMode.MODAL"
      [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
    >
      <div class="flex flex-row gap-4 mt-2">
        <div class="flex flex-row gap-1">
          <p-radioButton
            inputId="officialUpgradeExecution"
            name="officialUnofficialInput"
            [value]="true"
            [formControl]="officialFormControl"
          ></p-radioButton>
          <label for="officialUpgradeExecution">Official Execution</label>
        </div>
        <div class="flex flex-row gap-1">
          <p-radioButton
            inputId="unofficialUpgradeExecution"
            name="officialUnofficialInput"
            [value]="false"
            [formControl]="officialFormControl"
          ></p-radioButton>
          <label for="unofficialUpgradeExecution">Unofficial Execution</label>
        </div>
      </div>
    </mxevolve-definition-input>
    <mxevolve-definition-input
      style="display: contents"
      label="Execution Name"
      description=""
      inputFormControlName="nameFormControl"
      [inputFormControl]="nameFormControl"
      [displayMode]="DisplayMode.MODAL"
      [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
    >
      <input
        pInputText
        class="w-full"
        placeholder="Enter an upgrade process execution name"
        [formControl]="nameFormControl"
        id="upgradeProcessExecutionNameInput"
      />
    </mxevolve-definition-input>
  </div>
  <mxevolve-definition-input-group
    label="MX Parameters"
    [formControls]="mxParametersFormControls"
    [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
  >
    <div class="grid grid-cols-12 gap-x-8 gap-y-4">
      <mxevolve-definition-input
        style="display: contents"
        description="Select the factory product that you wish to validate your Quality Gate against"
        [inputFormControl]="conversionFactoryProductFormControl"
        inputFormControlName="factoryProduct"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-factory-product-selector
          [projectId]="projectId"
          [isRequired]="true"
          [factoryProductFormControl]="conversionFactoryProductFormControl"
          factoryProductFormControlName="factoryProduct"
        >
        </mxevolve-business-process-factory-product-selector>
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        label="Parent MX Archival Branch"
        description="Enter the MX Archival Branch from where the selected MX Version was branched"
        [inputFormControl]="parentMxArchivalBranchNameFormControl"
        inputFormControlName="parentMxArchivalBranch"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <input
          pInputText
          class="w-full"
          placeholder="Enter Parent MX Archival Branch"
          [formControl]="parentMxArchivalBranchNameFormControl"
          id="parentMxArchivalBranch"
          [attr.aria-describedby]="'parentMxArchivalBranch-help'"
        />
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        label="Upgrade Jump"
        description="Select the type of jump you want to launch"
        [inputFormControl]="upgradeJumpFormControl"
        inputFormControlName="upgradeJump"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-upgrade-jump-selector
          [upgradeJumpFormControl]="upgradeJumpFormControl"
          upgradeJumpFormControlName="upgradeJump"
        >
        </mxevolve-business-process-upgrade-jump-selector>
      </mxevolve-definition-input>
    </div>
  </mxevolve-definition-input-group>
  <mxevolve-definition-input-group
    label="Configuration Parameters"
    [formControls]="configurationParametersFormControls"
    [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
  >
    <mxevolve-upgrade-process-configuration-params-inputs
      class="grid grid-cols-12 gap-x-8 gap-y-4"
      [projectId]="projectId"
      [displayMode]="DisplayMode.MODAL"
      [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      [repositoryIdFormControl]="repositoryIdFormControl"
      [businessProcessQualityLevelFormControl]="
        businessProcessQualityLevelFormControl
      "
      [createBranchFormControl]="createBranchFormControl"
      [configurationBranchNameFormControl]="configurationBranchNameFormControl"
      [configurationParentBranchFormControl]="
        configurationParentBranchNameFormControl
      "
    >
    </mxevolve-upgrade-process-configuration-params-inputs>
  </mxevolve-definition-input-group>
  <mxevolve-definition-input-group
    label="Infrastructure Parameters"
    [formControls]="infraParametersFormControls"
    [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
  >
    <div class="grid grid-cols-12 gap-x-8 gap-y-4">
      <mxevolve-definition-input
        style="display: contents"
        label="Quality Gate Execution Infra Group"
        description='Select the Infra Group for the test(s) under "Execute Quality Gate" step'
        [inputFormControl]="qualityGateExecutionInfraGroupIdFormControl"
        inputFormControlName="qualityGateExecutionInfraGroupId"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-infra-group-selector
          [projectId]="projectId"
          [infraGroupFormControl]="qualityGateExecutionInfraGroupIdFormControl"
          infraGroupFormControlName="qualityGateExecutionInfraGroupId"
        ></mxevolve-business-process-infra-group-selector>
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        label="Binary Conversion Infra Group"
        description='Select the Infra Group for the test under "Convert Binary" step'
        [inputFormControl]="binaryConversionInfraGroupIdFormControl"
        inputFormControlName="binaryConversionInfraGroupId"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-infra-group-selector
          [projectId]="projectId"
          [infraGroupFormControl]="binaryConversionInfraGroupIdFormControl"
          infraGroupFormControlName="binaryConversionInfraGroupId"
        ></mxevolve-business-process-infra-group-selector>
      </mxevolve-definition-input>
    </div>
  </mxevolve-definition-input-group>
  <mxevolve-definition-input-group
    label="Tests"
    [formControls]="testParametersFormControls"
    [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
  >
    <div class="grid grid-cols-12 gap-x-8 gap-y-4">
      <mxevolve-definition-input
        style="display: contents"
        label="Quality Gate Execution Test Scenarios"
        description='Select the collection of test scenarios that you wish to launch in the "Execute Quality Gate" step'
        [inputFormControl]="qualityGateScenarioDefinitionIdsFormControl"
        inputFormControlName="testScenarioIds"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-scenario-definition-selector
          [projectId]="projectId"
          testScenariosFormControlName="testScenarioIds"
          [testScenarioFormControl]="
            qualityGateScenarioDefinitionIdsFormControl
          "
        ></mxevolve-business-process-scenario-definition-selector>
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        label="Binary Conversion Test Scenario"
        description='Select the test scenario that you wish to launch in the "Convert Binary" step'
        [inputFormControl]="binaryConversionTestScenarioIdFormControl"
        inputFormControlName="technicalUpgradeTestScenarioId"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-scenario-definition-selector
          [projectId]="projectId"
          testScenariosFormControlName="technicalUpgradeTestScenarioId"
          [testScenarioFormControl]="binaryConversionTestScenarioIdFormControl"
          [multiValue]="false"
        ></mxevolve-business-process-scenario-definition-selector>
      </mxevolve-definition-input>
    </div>
  </mxevolve-definition-input-group>
  <mxevolve-definition-input-group
    label="Reference Environment Parameters"
    [formControls]="referenceEnvironmentParametersFormControls"
    [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
  >
    <div class="grid grid-cols-12 gap-x-8 gap-y-4">
      <mxevolve-definition-input
        style="display: contents"
        label="Reference Commit ID"
        description="Select the commit ID of the reference environment"
        [inputFormControl]="referenceCommitIdFormControl"
        inputFormControlName="referenceCommitId"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <input
          pInputText
          class="w-full"
          placeholder="Enter Reference Commit ID"
          [formControl]="referenceCommitIdFormControl"
          id="referenceCommitId"
          [attr.aria-describedby]="'referenceCommitId-help'"
        />
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        label="Reference Environment Definition"
        description="Select the environment definition for the reference environment"
        [inputFormControl]="referenceEnvironmentDefinitionIdFormControl"
        inputFormControlName="referenceEnvironmentDefinitionId"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-environment-definition-selector
          [projectId]="projectId"
          [environmentDefinitionFormControl]="
            referenceEnvironmentDefinitionIdFormControl
          "
          environmentDefinitionFormControlName="referenceEnvironmentDefinitionId"
          [invalidateHiddenEnvironmentDefinition]="false"
        >
        </mxevolve-business-process-environment-definition-selector>
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        description="Select the factory product that you wish to use in your reference environment"
        [inputFormControl]="referenceFactoryProductFormControl"
        inputFormControlName="referenceFactoryProduct"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-factory-product-selector
          [projectId]="projectId"
          [isRequired]="true"
          [factoryProductFormControl]="referenceFactoryProductFormControl"
          factoryProductFormControlName="referenceFactoryProduct"
        >
        </mxevolve-business-process-factory-product-selector>
      </mxevolve-definition-input>
      <mxevolve-definition-input
        style="display: contents"
        label="Reference Environment Infra Group"
        description="Select the Infra Group for the reference environment"
        [inputFormControl]="referenceEnvironmentInfraGroupIdFormControl"
        inputFormControlName="referenceEnvironmentInfraGroupId"
        [displayMode]="DisplayMode.MODAL"
        [inputAccessMode]="InputAccessMode.ACCESS_INVALID_INPUTS_ONLY"
      >
        <mxevolve-business-process-infra-group-selector
          [projectId]="projectId"
          [infraGroupFormControl]="referenceEnvironmentInfraGroupIdFormControl"
          infraGroupFormControlName="referenceEnvironmentInfraGroupId"
        ></mxevolve-business-process-infra-group-selector>
      </mxevolve-definition-input>
    </div>
  </mxevolve-definition-input-group>

  <mxevolve-definition-input-group
    label="Notifications"
    [formControls]="[notificationsRecipientsFormControl]"
    [inputAccessMode]="InputAccessMode.ACCESS_EMPTY_OPTIONAL_INPUTS"
  >
    <div class="grid grid-cols-12 gap-x-8 gap-y-4">
      <mxevolve-definition-input
        style="display: contents"
        label="Expiry Date Notification Recipients"
        description="Select the users who will receive email notifications as the business process approaches its expiry date"
        [inputFormControl]="notificationsRecipientsFormControl"
        inputFormControlName="notificationsRecipients"
        [inputAccessMode]="InputAccessMode.ACCESS_EMPTY_OPTIONAL_INPUTS"
        [displayMode]="DisplayMode.MODAL"
      >
        <mxevolve-notifications-recipients-input
          [projectId]="projectId"
          [formControl]="notificationsRecipientsFormControl"
        ></mxevolve-notifications-recipients-input>
      </mxevolve-definition-input>
    </div>
  </mxevolve-definition-input-group>
</form>
}
