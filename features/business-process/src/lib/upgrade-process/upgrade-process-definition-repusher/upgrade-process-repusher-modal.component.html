<p-dialog
  [(visible)]="isVisible"
  [modal]="true"
  [draggable]="false"
  [resizable]="false"
  [style]="{ width: '40vw', maxHeight: '70vh' }"
  header="Execute Upgrade Process Definition"
  (onHide)="hideRepusherModal()"
  [closable]="!isExecuting"
>
  @if (errorMessage) {
  <mxflow-error-alert
    [errorMessage]="errorMessage"
    [closeable]="false"
  ></mxflow-error-alert>
  } @if (loading) {
  <div>
    <p-skeleton height="10rem"></p-skeleton>
  </div>
  }

  <mxevolve-repush-upgrade-process-definition-inputs>
  </mxevolve-repush-upgrade-process-definition-inputs>

  <ng-template pTemplate="footer">
    <div class="flex justify-end gap-2 mt-2">
      <p-button
        (onClick)="repushUpgradeExecution()"
        [disabled]="
          inputsComponent.isFormInitialized &&
          (!inputsComponent.form.valid || inputsComponent.form.pending)
        "
        [loading]="isExecuting"
      >
        Execute
      </p-button>
      <p-button
        (onClick)="hideRepusherModal()"
        [outlined]="true"
        [disabled]="isExecuting"
      >
        Cancel
      </p-button>
    </div>
  </ng-template>
</p-dialog>
