<div
  class="flex flex-col h-full border border-surface-300 dark:border-surface-700 rounded-md overflow-hidden bg-surface-50 dark:bg-surface-800"
>
  <div
    class="flex items-center justify-between px-4 py-2 border-b border-surface-300 dark:border-surface-700"
  >
    <span
      class="flex items-center gap-2 text-sm font-medium text-text-color min-w-0 overflow-hidden max-w-[90%]"
    >
      <i class="pi pi-file flex-shrink-0"></i>
      <span class="truncate" [title]="filePath()">{{ filePath() }}</span>
    </span>

    <div class="flex items-center gap-2 flex-shrink-0">
      @if (isEditing()) {
      <p-button
        label="Save"
        icon="pi pi-save"
        [loading]="isSaving()"
        [disabled]="!isDirty()"
        (onClick)="onSave()"
      />
      } @else {
      <span
        [pTooltip]="
          isDeletedFile()
            ? 'File is deleted'
            : !isRepositoryAvailable()
            ? 'Repository is not available'
            : ''
        "
        tooltipPosition="top"
      >
        <p-button
          label="Edit"
          icon="pi pi-pencil"
          [disabled]="
            isDeletedFile() || isLoading() || !isRepositoryAvailable()
          "
          (onClick)="onEdit()"
        />
      </span>
      }
    </div>
  </div>

  @if (isLoading()) {
  <div class="flex flex-col flex-1 min-h-0">
    <div class="px-3 py-2 border-b border-surface-300 dark:border-surface-700">
      <p-skeleton width="8rem" height="1rem" />
    </div>
    <div class="flex flex-col flex-1 gap-2 p-3">
      <p-skeleton width="100%" height="0.75rem" />
      <p-skeleton width="80%" height="0.75rem" />
      <p-skeleton width="90%" height="0.75rem" />
      <p-skeleton width="60%" height="0.75rem" />
      <p-skeleton width="85%" height="0.75rem" />
      <p-skeleton width="70%" height="0.75rem" />
      <p-skeleton width="95%" height="0.75rem" />
      <p-skeleton width="55%" height="0.75rem" />
    </div>
  </div>
  } @else if (isDeletedFile()) {
  <div
    class="flex flex-col flex-1 min-h-0 items-center justify-center gap-3 text-color-secondary text-sm"
  >
    <span>This file is deleted.</span>
    <p-button
      label="Restore"
      icon="pi pi-undo"
      [loading]="isRestoring()"
      [disabled]="!isRepositoryAvailable()"
      (onClick)="onRestore()"
    />
  </div>
  } @else {
  <div class="px-4 pb-4 flex-1 min-h-0">
    <mxevolve-monaco-editor
      class="flex-1 min-h-0"
      [initialContent]="fileContent()"
      [language]="language()"
      [options]="editorOptions"
      (editorReady)="onEditorReady($event)"
    />
  </div>
  }
</div>
