<p-confirmDialog />

<mxevolve-file-management-source-tree-add-dialog
  [visible]="showAddDialog()"
  [parentPath]="selectedDirectory?.data?.filePath ?? null"
  (addRequested)="onAddRequested($event)"
  (cancelled)="closeAddDialog()"
/>

<div class="flex flex-col h-full">
  <div
    class="flex items-center justify-between px-2 py-1 border-b border-surface-300 dark:border-surface-700"
  >
    <span class="text-sm font-semibold text-color">Workspace Explorer</span>
    <div class="flex items-center gap-1">
      <p-button
        icon="pi pi-plus"
        [text]="true"
        size="small"
        pTooltip="Add file or directory"
        tooltipPosition="top"
        (onClick)="openAddDialog()"
      />
      <p-button
        icon="pi pi-minus"
        [text]="true"
        size="small"
        severity="danger"
        pTooltip="Delete selected file or directory"
        tooltipPosition="top"
        [disabled]="!selectedNode"
        (onClick)="onDeleteButtonClicked()"
      />
    </div>
  </div>

  <div class="flex-1 min-h-0 overflow-auto">
    <mxevolve-git-file-tree
      [files]="displayFiles()"
      [loading]="treeLoading()"
      [openPredicate]="openPredicate"
      [selectionMode]="selectionMode()"
      (fileSelected)="onFileNodeSelected($event)"
      (fileOpenBlocked)="onTreeFileOpenBlocked($event)"
      (directorySelected)="onDirectoryNodeSelected($event)"
      (directoryExpanded)="onDirectoryNodeExpanded($event)"
    />
  </div>
</div>
