<div class="flex justify-between flex-wrap mb-2 mt-1">
  <div class="text-md text-gray-500 italic">
    <p>Select one or more incidents causing your test(s) to fail</p>
  </div>
  <div>
    <mxevolve-create-incident-button
      [buttonLabel]="'Create New'"
      [projectId]="projectId"
      [mxVersion]="mxVersion"
      [jumpType]="jumpType"
      [scenarioExecutionId]="scenarioExecutionId"
      [businessProcessExecutionId]="businessProcessId"
      [environmentId]="environmentId"
      [scenarioName]="scenarioName"
      [correlationId$]="correlationId$"
      [qualityLevel]="qualityLevel"
    ></mxevolve-create-incident-button>
  </div>
</div>
<div class="mb-6">
  <mxevolve-incidents-selection-table
    [initiallySelectedIncidents]="initiallySelectedIncidents"
    [selectedIncidentIdsLoading]="selectedIncidentIdsLoading"
    [refresh]="refresh$"
    (selectedIncidentsChange)="onIncidentsSelectionChange($event)"
  >
  </mxevolve-incidents-selection-table>
</div>
