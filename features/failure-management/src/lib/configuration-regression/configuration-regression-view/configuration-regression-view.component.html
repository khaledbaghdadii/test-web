<mxevolve-card-container>
  <div class="border-b border-surface pt-2">
    <mxflow-header-title>
      Configuration Regression Details
      <div right-content>
        <p-button label="Edit" (onClick)="handleEdit()"></p-button>
      </div>
    </mxflow-header-title>
  </div>

  <div class="my-4">
    <mxevolve-configuration-regression-details
      #configurationRegressionDetailsComponent
      [projectId]="projectId"
      [projectName]="projectName"
      [configurationRegressionId]="configurationRegressionId"
      (errorMessageEmitter)="handleError($event)"
    ></mxevolve-configuration-regression-details>
  </div>

  <div class="mt-8 mb-4 p-4">
    <p-divider>
      <div class="my-6 text-xl font-medium">
        Scenario(s) Linked to this Regression
      </div>
    </p-divider>
    <mxevolve-project-specific-analysis-object-links-table
      [projectId]="projectId"
      [analysisObjectId]="configurationRegressionId"
      [analysisObjectType]="AnalysisObjectType.CONFIGURATION_REGRESSION"
      (errorMessageEmitter)="handleError($event)"
    ></mxevolve-project-specific-analysis-object-links-table>
  </div>
</mxevolve-card-container>

<mxevolve-edit-configuration-regression-modal
  [isModalShown]="showEditConfigurationRegressionModal"
  [projectId]="projectId"
  [configurationRegressionId]="configurationRegressionId"
  (closeModalEvent)="handleCloseModalEvent()"
  (configurationRegressionEdited)="handleConfigurationRegressionEdited()"
></mxevolve-edit-configuration-regression-modal>
