<div>
  <div class="text-md text-gray-500 italic">
    <p>Select one or more impacts causing your test(s) to fail</p>
  </div>

  <div class="flex flex-col gap-3 w-full mt-4 mb-2">
    <div class="grid grid-cols-12">
      <div class="col-span-8">
        <mxevolve-validation-scope-setter
          [(validationScope)]="validationScope"
          [initialValidationScope]="initialValidationScope()"
        ></mxevolve-validation-scope-setter>
      </div>
      <div class="col-span-4 flex flex-col">
        <div class="flex justify-between items-center">
          <mxevolve-show-detection-with-no-defects-toggle
            [detectionType]="DetectionType.Binary"
            [detectionCategory]="DetectionCategory.Impact"
            [warningMessage]="warningMessage"
            [(showDetectionsWithoutDefects)]="showImpactsWithoutDefects"
            [(validationScope)]="validationScope"
          ></mxevolve-show-detection-with-no-defects-toggle>
          <mxevolve-create-binary-impact-button
            [buttonLabel]="'Create New'"
            [submitCreationButtonLabel]="'Create and Link'"
            [projectId]="projectId"
            [correlationId]="scenarioExecutionId"
            [mxVersionInitialValue]="mxVersionInitialValue"
            [validationScope]="validationScope()"
            [initialValidationScope]="initialValidationScope()"
            [upgradeImpactWarningMessage]="warningMessage"
            (binaryImpactCreated)="onBinaryImpactCreated($event)"
            (binaryImpactCreationModalOpened)="showCreateBinaryImpactModal()"
            (binaryImpactCreationModalClosed)="onCreateBinaryImpactCancelled()"
          ></mxevolve-create-binary-impact-button>
        </div>
      </div>
    </div>
  </div>
  @if (warningMessage) {
  <p-message
    data-testid="warning-message"
    severity="warn"
    styleClass="mt-1 mb-4 mx-0.5"
    [closable]="false"
    [showTransitionOptions]="'0ms'"
    [hideTransitionOptions]="'0ms'"
  >
    {{ warningMessage }}
  </p-message>
  }
  <mxevolve-binary-impacts-selection-table
    data-testid="binary-impact-selection-table"
    [projectId]="projectId"
    [selectedImpactIdsLoading]="selectedImpactIdsLoading"
    [initiallySelectedImpacts]="initiallySelectedImpacts"
    [refresh]="refresh$"
    (selectedBinaryImpactsChange)="onBinaryImpactSelectionChange($event)"
    [validationScope]="validationScope()"
    (warningMessageChange)="handleWarningMessage($event)"
    [showImpactsWithoutDefects]="showImpactsWithoutDefects()"
  ></mxevolve-binary-impacts-selection-table>
</div>
