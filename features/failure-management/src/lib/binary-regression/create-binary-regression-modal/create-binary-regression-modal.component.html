<p-dialog
  data-testid="create-binary-regression-modal"
  header="Create a Binary Regression"
  [(visible)]="isVisible"
  [modal]="true"
  [style]="{ width: '50vw' }"
  (onHide)="onCancel()"
>
  <form
    [formGroup]="createBinaryRegressionForm"
    (ngSubmit)="onFormSubmission()"
  >
    <div class="grid grid-cols-12 gap-4">
      <div class="gap-2 col-span-10 col-start-2 pt-2">
        <mxflow-mandatory-field></mxflow-mandatory-field>
      </div>
      <div class="col-span-10 col-start-2 flex flex-col gap-2">
        <label for="title" class="block"
          >Title <span class="text-red-500">*</span></label
        >
        <input
          id="title"
          type="text"
          pInputText
          placeholder="Enter a Title"
          formControlName="title"
        />
        <ng-template
          [ngTemplateOutlet]="errorTipTemplate"
          [ngTemplateOutletContext]="{
            $implicit: createBinaryRegressionForm.controls.title
          }"
        ></ng-template>
      </div>
      <div class="col-span-10 col-start-2 flex flex-col gap-2">
        <label for="defect" class="block">Defect</label>
        <mxevolve-defect-selection-input
          id="defect"
          formControlName="defect"
          [validationScope]="validationScope"
          [initialValidationScope]="initialValidationScope"
          [warningMessage]="warningMessage"
          (errorMessage)="handleErrorOccurred($event)"
        ></mxevolve-defect-selection-input>
        <ng-template
          [ngTemplateOutlet]="errorTipTemplate"
          [ngTemplateOutletContext]="{
            $implicit: createBinaryRegressionForm.controls.defect
          }"
        ></ng-template>
      </div>

      <div class="col-span-10 col-start-2 flex flex-col gap-2">
        <label for="mxVersion" class="block"
          >MX Version <span class="text-red-500">*</span></label
        >
        <input
          id="mxVersion"
          type="text"
          pInputText
          placeholder="Enter a MX Version"
          formControlName="mxVersion"
        />
        <ng-template
          [ngTemplateOutlet]="errorTipTemplate"
          [ngTemplateOutletContext]="{
            $implicit: createBinaryRegressionForm.controls.mxVersion
          }"
        ></ng-template>
      </div>

      <div class="col-span-10 col-start-2 flex flex-col gap-2">
        <label for="fix" class="block">Fix</label>
        <input
          id="fix"
          type="text"
          pInputText
          placeholder="Enter a Fix"
          formControlName="fix"
        />
        <ng-template
          [ngTemplateOutlet]="errorTipTemplate"
          [ngTemplateOutletContext]="{
            $implicit: createBinaryRegressionForm.controls.fix
          }"
        ></ng-template>
      </div>

      <div class="col-span-10 col-start-2 flex flex-col gap-2">
        <label for="incidentId" class="block">Incident</label>
        <mxevolve-incident-input
          id="incidentId"
          formControlName="incidentId"
        ></mxevolve-incident-input>
      </div>

      <div class="col-span-10 col-start-2 flex flex-col gap-2">
        <label for="description" class="block"
          >Description <span class="text-red-500">*</span></label
        >
        <mxevolve-quill-editor
          id="description"
          formControlName="description"
        ></mxevolve-quill-editor>
        <ng-template
          [ngTemplateOutlet]="errorTipTemplate"
          [ngTemplateOutletContext]="{
            $implicit: createBinaryRegressionForm.controls.description
          }"
        ></ng-template>
      </div>
    </div>

    <div class="flex justify-end">
      <p-button
        type="submit"
        label="{{ submitCreationButtonLabel }}"
        class="pl-4"
        [disabled]="!this.createBinaryRegressionForm.valid"
        [loading]="isLoading"
      ></p-button>
      <p-button
        data-testid="cancel-button"
        label="Cancel"
        [outlined]="true"
        (click)="onCancel()"
        class="pl-4"
      ></p-button>
    </div>
  </form>
</p-dialog>

<ng-template #errorTipTemplate let-control>
  <div class="input-error h-4">
    @if (control.invalid && control.dirty) {
    <div class="flex gap-1 pt-1">
      @if (control.hasError('maxlength')) {
      <small class="p-error block"
        >Maximum length is {{ control.errors?.maxlength.requiredLength }}</small
      >
      } @if (control.hasError('required')) {
      <small class="p-error block">Field is required</small>
      } @if (control.hasError('whitespace')) {
      <small class="p-error block">Field cannot be whitespaces</small>
      }
    </div>
    }
  </div>
</ng-template>
