<p-table
  [value]="reasons"
  [showLoader]="false"
  [loading]="isLoading"
  [tableStyle]="{ 'min-width': '50rem' }"
>
  <ng-template pTemplate="header">
    <tr>
      <th scope="col" class="w-5/12">Title</th>
      <th scope="col" class="w-6/12">Description</th>
      <th scope="col" class="w-1/12"></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-failureReason>
    <tr>
      <td>{{ failureReason.title }}</td>
      <td>{{ failureReason.description }}</td>
      <td>
        <div
          pTooltip="Unlink"
          tooltipPosition="top"
          style="display: flex; justify-content: center"
        >
          <p-button
            [attr.data-testid]="`unlink-button-${failureReason.id}`"
            icon="pi pi-link"
            [rounded]="true"
            [text]="true"
            (onClick)="onUnlink(failureReason.id)"
          ></p-button>
        </div>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="loadingbody">
    @for (row of [1, 2, 3]; track row) {
    <tr>
      @for (col of [1, 2, 3]; track col) {
      <td>
        <p-skeleton></p-skeleton>
      </td>
      }
    </tr>
    }
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="9" class="py-4">
        <mxflow-table-empty-message></mxflow-table-empty-message>
      </td>
    </tr>
  </ng-template>
</p-table>
