<div>
  <div class="flex justify-between flex-wrap mb-2">
    <div class="text-md text-gray-500 italic">
      <p>Select one or more failure reasons causing your test(s) to fail</p>
    </div>
  </div>
  <div class="mb-6">
    <mxevolve-failure-reason-selection-table
      [selectedFailureReasonIdsLoading]="selectedFailureReasonIdsLoading"
      [initiallySelectedFailureReasons]="initiallySelectedFailureReasons"
      [refresh]="refresh$"
      (selectedFailureReasonsChange)="onFailureReasonSelectionChange($event)"
    >
    </mxevolve-failure-reason-selection-table>
  </div>
</div>
