<p-table
  [value]="regressions"
  [showLoader]="false"
  [loading]="isLoading"
  [tableStyle]="{ 'min-width': '50rem' }"
>
  <ng-template pTemplate="header">
    <tr>
      <th scope="col" class="w-4/12">Regression Title</th>
      <th scope="col" class="w-3/12">Guilty Change</th>
      <th scope="col" class="w-2/12">Fix</th>
      <th scope="col" class="w-2/12">Owner</th>
      <th scope="col" class="w-1/12"></th>
    </tr>
  </ng-template>
  <ng-template pTemplate="body" let-configurationRegression>
    <tr>
      <td>
        <a
          class="p-button-link"
          routerLink="{{
            {
              id: configurationRegression.id,
              category: DetectionCategory.Regression,
              type: DetectionType.Configuration,
              projectId: configurationRegression.projectId
            } | detectionUriBuilder
          }}"
          target="_blank"
          >{{ configurationRegression.title }}</a
        >
      </td>
      <td>{{ configurationRegression.guiltyChange }}</td>
      <td>{{ configurationRegression.fix }}</td>
      <td>{{ configurationRegression.owner }}</td>
      <td>
        <div
          pTooltip="Unlink"
          tooltipPosition="top"
          style="display: flex; justify-content: center"
        >
          <p-button
            icon="pi pi-link"
            [rounded]="true"
            [text]="true"
            (onClick)="onUnlink(configurationRegression.id)"
          ></p-button>
        </div>
      </td>
    </tr>
  </ng-template>
  <ng-template pTemplate="loadingbody">
    @for (row of [1, 2, 3]; track row) {
    <tr>
      @for (col of [1, 2, 3, 4, 5]; track col) {
      <td>
        <p-skeleton></p-skeleton>
      </td>
      }
    </tr>
    }
  </ng-template>
  <ng-template pTemplate="emptymessage">
    <tr>
      <td colspan="9" class="py-4">
        <mxflow-table-empty-message></mxflow-table-empty-message>
      </td>
    </tr>
  </ng-template>
</p-table>
