<div>
  <div
    class="flex justify-between items-center"
    [ngClass]="{ 'mb-3': totalItems() > 0 }"
  >
    <div class="flex items-center gap-4">
      <div class="gap-2" [class.invisible]="totalItems() === 0">
        <p-button
          [icon]="isCollapsed() ? 'pi pi-chevron-down' : 'pi pi-chevron-up'"
          severity="secondary"
          [text]="true"
          size="small"
          (onClick)="toggleCollapse()"
          data-testid="swimlane-collapse-toggle"
          [ariaLabel]="isCollapsed() ? 'Expand swimlane' : 'Collapse swimlane'"
        ></p-button>
      </div>
      <div class="flex items-center gap-2">
        <p-badge [value]="totalItems().toString()" badgeSize="large"></p-badge>
      </div>
      <h3 class="text-lg font-semibold">{{ workItemSwimlaneConfig.title }}</h3>
    </div>
  </div>

  <hr class="my-2 border-gray-200 dark:border-gray-700" />

  @if (!isCollapsed()) {
  <div class="group">
    <div
      class="group overflow-y-hidden group-hover:overflow-y-auto overflow-x-hidden h-[600px] bg-gray-100 dark:bg-gray-950 pt-2 pb-2 pl-0 pr-[5px] swimlane-stable-gutter"
      #swimlaneContainer
    >
      @if (totalItems() === 0) {
      <div class="flex gap-8 w-full h-full">
        @for (column of columns(); track trackByColumnId($index, column)) {
        <div
          class="flex-1"
          [attr.data-column-id]="column.id"
          [attr.aria-label]="column.title + ' column'"
        >
          <div class="grid grid-cols-1 gap-4 w-full">
            @for (skel of [1, 2, 3, 4, 5]; track skel) {
            <mxevolve-work-item-card-skeleton></mxevolve-work-item-card-skeleton>
            }
          </div>
        </div>
        }
      </div>
      }

      <div class="flex gap-8 w-full min-h-full">
        @for (column of columns(); track trackByColumnId($index, column)) {
        <div
          class="flex-1"
          [attr.data-column-id]="column.id"
          [attr.aria-label]="column.title + ' column'"
        >
          <mxevolve-work-items-column
            [columnId]="column.id"
            [swimlaneId]="workItemSwimlaneConfig.id"
          ></mxevolve-work-items-column>
        </div>
        }
      </div>
    </div>
  </div>
  }
</div>
