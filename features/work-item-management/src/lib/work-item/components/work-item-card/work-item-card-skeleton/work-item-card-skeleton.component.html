<p-card>
  <ng-template pTemplate="content">
    <div class="flex flex-col h-full">
      <div class="flex mb-2 items-center">
        <p-skeleton width="4rem" height="1.5rem"></p-skeleton>
        <p-skeleton shape="circle" size="1.5rem" class="ml-2"></p-skeleton>
        <p-skeleton width="2rem" height="2rem" class="ml-auto"></p-skeleton>
      </div>
      <div class="bg-gray-100 dark:bg-[#3B82F629] p-2 rounded flex-1 mb-2">
        <p-skeleton width="80%" height="1.5rem" class="mb-2"></p-skeleton>
        <p-skeleton width="10rem" height="1rem" class="mb-2"></p-skeleton>
        <div class="mb-1 flex items-center">
          <p-skeleton width="1rem" height="1rem" class="mr-2"></p-skeleton>
          <p-skeleton width="6rem" height="1rem"></p-skeleton>
        </div>
        <div class="flex items-baseline mt-1">
          <p-skeleton width="1rem" height="1rem" class="mr-2"></p-skeleton>
          <p-skeleton width="8rem" height="1rem"></p-skeleton>
        </div>
      </div>
      <div class="flex-shrink-0">
        <div class="flex items-center mb-2 min-w-0">
          <p-skeleton
            shape="circle"
            size="2rem"
            class="mr-2 flex-shrink-0"
          ></p-skeleton>
          <p-skeleton width="6rem" height="1rem" class="flex-1"></p-skeleton>
          <p-skeleton
            width="2rem"
            height="2rem"
            class="ml-2 flex-shrink-0"
          ></p-skeleton>
        </div>
        <div class="flex items-center mb-2">
          <p-skeleton shape="circle" size="2rem" class="mr-2"></p-skeleton>
          <p-skeleton width="5rem" height="1rem"></p-skeleton>
        </div>
        <div>
          <p-skeleton width="6rem" height="1rem" class="mb-1"></p-skeleton>
          <p-skeleton width="100%" height="0.5rem"></p-skeleton>
        </div>
      </div>
    </div>
  </ng-template>
</p-card>
